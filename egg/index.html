<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Android 系统版本</title>
<style>
:root {
  --bg: #ffffff;
  --text: #222222;
  --card-bg: #f5f5f5;
  --border: #dddddd;
  --link-color: #d39e00;
}
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: system-ui, sans-serif;
}
body {
  background-color: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding: 30px 20px;
}
.container {
  max-width: 800px;
  margin: 0 auto;
}
.top-bar {
  display:flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 30px;
  padding-bottom: 15px;
  border-bottom: 1px solid var(--border);
}
h1 {
  font-size: 22px;
}
.lang-select {
  padding: 6px 10px;
  border-radius: 6px;
  background: var(--card-bg);
  color: var(--text);
  border: 1px solid var(--border);
}
.item-card {
  background: var(--card-bg);
  border-radius: 12px;
  padding: 20px;
  margin-bottom: 16px;
  border: 1px solid var(--border);
}
.info-row {
  margin: 10px 0;
}
.label {
  opacity: 0.7;
  min-width: 110px;
  display: inline-block;
}
.egg-icon {
  color: var(--link-color);
  text-decoration: none;
  cursor: pointer;
}
.egg-icon:hover {
  text-decoration: underline;
}
.bottom-more {
  margin-top: 50px;
  text-align: center;
  padding-bottom: 40px;
}
.bottom-more a {
  font-size: 14px;
  color: #888;
  text-decoration: none;
}
.bottom-more a:hover {
  color: var(--link-color);
}
.translate-tip {
  position: fixed;
  right: 20px;
  bottom: 15px;
  font-size: 12px;
  color: #666;
  user-select: none;
  pointer-events: none;
  display: none;
}
</style>
</head>
<body>
<div class="container">
  <div class="top-bar">
    <h1 data-i18n="title">Android 系统版本</h1>
    <select class="lang-select" id="langSelect">
      <option value="zh-CN">简体中文</option>
      <option value="zh-TW">繁體中文</option>
      <option value="de">Deutsch（德语）</option>
      <option value="es">Español（西班牙语）</option>
      <option value="fil">Filipino（菲律宾语）</option>
    </select>
  </div>

  <div class="item-card">
    <div class="info-row">
      <span class="label" data-i18n="version">系统版本：</span>
      <span>Android 2.3 Gingerbread</span>
    </div>
    <div class="info-row">
      <span class="label" data-i18n="api">API 等级：</span>
      <span>9</span>
    </div>
    <div class="info-row">
      <span class="label" data-i18n="entry">彩蛋入口：</span>
      <a class="egg-icon" href="2.3/index.html" target="_blank" data-i18n="eggText">彩蛋</a>
    </div>
  </div>

  <div class="item-card">
    <div class="info-row">
      <span class="label" data-i18n="version">系统版本：</span>
      <span>Android 3.0 Honeycomb</span>
    </div>
    <div class="info-row">
      <span class="label" data-i18n="api">API 等级：</span>
      <span>11</span>
    </div>
    <div class="info-row">
      <span class="label" data-i18n="entry">彩蛋入口：</span>
      <a class="egg-icon" href="3.0/index.html" target="_blank" data-i18n="eggText">彩蛋</a>
    </div>
  </div>

  <div class="item-card">
    <div class="info-row">
      <span class="label" data-i18n="version">系统版本：</span>
      <span>Android 4.0 Ice Cream Sandwich</span>
    </div>
    <div class="info-row">
      <span class="label" data-i18n="api">API 等级：</span>
      <span>14</span>
    </div>
    <div class="info-row">
      <span class="label" data-i18n="entry">彩蛋入口：</span>
      <a class="egg-icon" href="14/index.html" target="_blank" data-i18n="eggText">彩蛋</a>
    </div>
  </div>

  <div class="item-card">
    <div class="info-row">
      <span class="label" data-i18n="version">系统版本：</span>
      <span>Android 4.0.3 / 4.0.4 Ice Cream Sandwich</span>
    </div>
    <div class="info-row">
      <span class="label" data-i18n="api">API 等级：</span>
      <span>15</span>
    </div>
    <div class="info-row">
      <span class="label" data-i18n="entry">彩蛋入口：</span>
      <a class="egg-icon" href="15/index.html" target="_blank" data-i18n="eggText">彩蛋</a>
    </div>
  </div>

  <div class="item-card">
    <div class="info-row">
      <span class="label" data-i18n="version">系统版本：</span>
      <span>Android 4.1 Jelly Bean</span>
    </div>
    <div class="info-row">
      <span class="label" data-i18n="api">API 等级：</span>
      <span>16</span>
    </div>
    <div class="info-row">
      <span class="label" data-i18n="entry">彩蛋入口：</span>
      <a class="egg-icon" href="16/index.html" target="_blank" data-i18n="eggText">彩蛋</a>
    </div>
  </div>

  <div class="bottom-more">
    <a href="https://landroid.js.org/eggs/" target="_blank" data-i18n="moreEgg">更多系统彩蛋</a>
  </div>
</div>

<div class="translate-tip" id="translateTip"></div>
<script>
const langData = {
  "zh-CN": {
    title: "Android 系统版本",
    version: "系统版本：",
    api: "API 等级：",
    entry: "彩蛋入口：",
    eggText: "彩蛋",
    moreEgg: "更多系统彩蛋",
    showTip: false,
    tip: ""
  },
  "zh-TW": {
    title: "Android 系統版本",
    version: "系統版本：",
    api: "API 等級：",
    entry: "彩蛋入口：",
    eggText: "彩蛋",
    moreEgg: "更多系統彩蛋",
    showTip: true,
    tip: "由中國豆包AI翻譯"
  },
  "de": {
    title: "Android Systemversionen",
    version: "Systemversion:",
    api: "API-Stufe:",
    entry: "Easter-Egg-Zugang:",
    eggText: "Easter Egg",
    moreEgg: "Weitere System Easter Eggs",
    showTip: true,
    tip: "Übersetzt von chinesischer Doubao-KI"
  },
  "es": {
    title: "Versiones del sistema Android",
    version: "Versión del sistema:",
    api: "Nivel API:",
    entry: "Acceso al Easter Egg:",
    eggText: "Easter Egg",
    moreEgg: "Más Easter Eggs del sistema",
    showTip: true,
    tip: "Traducido por IA Doubao de China"
  },
  "fil": {
    title: "Mga Bersyon ng Android System",
    version: "Bersyon ng Sistema:",
    api: "Antas ng API:",
    entry: "Pagpasok sa Easter Egg:",
    eggText: "Easter Egg",
    moreEgg: "Higit pang mga Easter Egg ng sistema",
    showTip: true,
    tip: "Isinalin ng AI Doubao mula sa Tsina"
  }
};

const langSelect = document.getElementById('langSelect');
const tipDom = document.getElementById('translateTip');
let saveLang = localStorage.getItem('siteLang') || 'zh-CN';
langSelect.value = saveLang;

function setLanguage(lang) {
  const text = langData[lang];
  document.documentElement.lang = lang;

  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.getAttribute('data-i18n');
    el.innerText = text[key];
  });

  if(text.showTip){
    tipDom.style.display = 'block';
    tipDom.innerText = text.tip;
  }else{
    tipDom.style.display = 'none';
  }
}

setLanguage(saveLang);

langSelect.addEventListener('change', function(){
  const val = this.value;
  localStorage.setItem('siteLang', val);
  setLanguage(val);
});
</script>
</body>
</html>
