<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2.3</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
    background:#ffffff;
    min-height:100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}
#showImg{
    width:100%;
    height:auto;
    cursor:pointer;
    display:block;
}

/* 安卓原生弹窗样式 */
.dialog-mask{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.4);
    display:none;
    justify-content:center;
    align-items:center;
    z-index:999;
}
.dialog-box{
    width:82%;
    max-width:320px;
    background:#fff;
    border-radius:12px;
    overflow:hidden;
    font-family:system-ui,-apple-system,sans-serif;
}
.dialog-text{
    padding:24px 24px 16px;
    font-size:16px;
    color:#212121;
}
.dialog-btn-wrap{
    display:flex;
    justify-content:flex-end;
    padding:0 12px 12px;
}
.dialog-btn{
    border:none;
    background:transparent;
    color:#0288d1;
    font-size:15px;
    padding:10px 16px;
    cursor:pointer;
    border-radius:8px;
}
.dialog-btn:active{
    background:#e8f5fd;
}
</style>
</head>
<body>
<img id="showImg" src="g_platlogo.webp" alt="插画">

<!-- 安卓风格弹窗 -->
<div class="dialog-mask" id="mask">
    <div class="dialog-box">
        <div class="dialog-text">REZZZZZZZ…</div>
        <div class="dialog-btn-wrap">
            <button class="dialog-btn" id="closeBtn">确定</button>
        </div>
    </div>
</div>

<script>
const img = document.getElementById('showImg');
const mask = document.getElementById('mask');
const closeBtn = document.getElementById('closeBtn');

img.onclick = ()=>{
    mask.style.display = 'flex';
}
closeBtn.onclick = ()=>{
    mask.style.display = 'none';
}
mask.onclick = (e)=>{
    if(e.target === mask) mask.style.display = 'none';
}
</script>
</body>
</html>
